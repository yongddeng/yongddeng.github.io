<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" font-family="monospace" font-size="12">
  <!-- Background -->
  <rect width="520" height="340" fill="white"/>

  <!-- Title -->
  <text x="260" y="24" text-anchor="middle" font-size="14" font-weight="bold">NAND Flash: Block / Page / Cell</text>

  <!-- Block 0 -->
  <rect x="20" y="44" width="230" height="160" rx="4" fill="none" stroke="#333" stroke-width="2"/>
  <text x="135" y="62" text-anchor="middle" font-weight="bold" fill="#333">Block 0</text>

  <!-- Pages in Block 0 -->
  <rect x="32" y="72" width="206" height="24" rx="2" fill="#d1e7dd" stroke="#333" stroke-width="1"/>
  <text x="135" y="88" text-anchor="middle" fill="#333">Page 0  [cell|cell|cell|...]</text>

  <rect x="32" y="100" width="206" height="24" rx="2" fill="#d1e7dd" stroke="#333" stroke-width="1"/>
  <text x="135" y="116" text-anchor="middle" fill="#333">Page 1  [cell|cell|cell|...]</text>

  <rect x="32" y="128" width="206" height="24" rx="2" fill="#f8d7da" stroke="#333" stroke-width="1"/>
  <text x="135" y="144" text-anchor="middle" fill="#999">Page 2  [stale]</text>

  <rect x="32" y="156" width="206" height="24" rx="2" fill="#f8d7da" stroke="#333" stroke-width="1"/>
  <text x="135" y="172" text-anchor="middle" fill="#999">Page 3  [stale]</text>

  <!-- Block 1 -->
  <rect x="270" y="44" width="230" height="160" rx="4" fill="none" stroke="#333" stroke-width="2"/>
  <text x="385" y="62" text-anchor="middle" font-weight="bold" fill="#333">Block 1 (free)</text>

  <rect x="282" y="72" width="206" height="24" rx="2" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
  <text x="385" y="88" text-anchor="middle" fill="#aaa">-</text>

  <rect x="282" y="100" width="206" height="24" rx="2" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
  <text x="385" y="116" text-anchor="middle" fill="#aaa">-</text>

  <rect x="282" y="128" width="206" height="24" rx="2" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
  <text x="385" y="144" text-anchor="middle" fill="#aaa">-</text>

  <rect x="282" y="156" width="206" height="24" rx="2" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
  <text x="385" y="172" text-anchor="middle" fill="#aaa">-</text>

  <!-- GC arrow: copy valid pages -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <path d="M 238 84 Q 260 60 282 84" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="260" y="48" text-anchor="middle" font-size="10" fill="#555">GC: copy valid</text>

  <!-- Annotations -->
  <!-- Write = page level -->
  <rect x="20" y="220" width="230" height="44" rx="4" fill="#d1e7dd" stroke="#333" stroke-width="1"/>
  <text x="135" y="238" text-anchor="middle" font-size="11" fill="#333">Write = per page (~4-16 KB)</text>
  <text x="135" y="254" text-anchor="middle" font-size="10" fill="#555">smallest unit of read/write</text>

  <!-- Erase = block level -->
  <rect x="270" y="220" width="230" height="44" rx="4" fill="#f8d7da" stroke="#333" stroke-width="1"/>
  <text x="385" y="238" text-anchor="middle" font-size="11" fill="#333">Erase = per block (256-512 pages)</text>
  <text x="385" y="254" text-anchor="middle" font-size="10" fill="#555">must erase entire block at once</text>

  <!-- Wear leveling -->
  <rect x="20" y="280" width="480" height="44" rx="4" fill="#fff3cd" stroke="#333" stroke-width="1"/>
  <text x="260" y="298" text-anchor="middle" font-size="11" fill="#333">Wear leveling: each cell has finite P/E cycles (1K-100K)</text>
  <text x="260" y="314" text-anchor="middle" font-size="10" fill="#555">controller spreads writes evenly so no single block wears out first</text>
</svg>
